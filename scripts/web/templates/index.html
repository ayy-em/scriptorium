{% extends "base.html" %}
{% block title %}Scriptorium{% endblock %}
{% block content %}
<h1>Scripts</h1>
<style>
  .theme-label {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888;
    margin: 1.75rem 0 0.4rem;
  }
  .script-list {
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    overflow: hidden;
    background: white;
  }
  .script-row {
    display: flex;
    align-items: baseline;
    gap: 1.25rem;
    padding: 0.65rem 1rem;
    border-bottom: 1px solid #f3f4f6;
  }
  .script-row:last-child { border-bottom: none; }
  .script-row:hover { background: #f0f7ff; }
  .script-key {
    font-family: ui-monospace, monospace;
    font-size: 0.85rem;
    font-weight: 500;
    min-width: 210px;
  }
  .script-title { font-size: 0.875rem; color: #555; }
</style>

{% for theme, scripts in themes.items() %}
<p class="theme-label">{{ theme }}</p>
<div class="script-list">
  {% for name, mod in scripts.items() %}
  <div class="script-row">
    <span class="script-key">
      <a href="/scripts/{{ theme }}/{{ name }}">{{ theme }}.{{ name }}</a>
    </span>
    <span class="script-title">{{ mod.TITLE }}</span>
  </div>
  {% endfor %}
</div>
{% endfor %}
{% endblock %}
