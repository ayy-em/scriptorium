{% from "_macros.html" import theme_icon %}
<aside class="sidebar">
  <nav class="sidebar-nav">
    <a href="/"
       class="sidebar-link{% if active_page == 'scripts' %} active{% endif %}"
       @click="$store.ui.activeCategory = null">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M2 3.5A1.5 1.5 0 0 1 3.5 2h9A1.5 1.5 0 0 1 14 3.5v9A1.5 1.5 0 0 1 12.5 14h-9A1.5 1.5 0 0 1 2 12.5v-9Z" stroke="currentColor" stroke-width="1.4"/>
        <path d="M5 6h6M5 9h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      Scripts
    </a>
    <a href="#" class="sidebar-link">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M8 13.5S2 10 2 5.5a3.5 3.5 0 0 1 6-2.43A3.5 3.5 0 0 1 14 5.5C14 10 8 13.5 8 13.5Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
      </svg>
      Favourites
    </a>
    <a href="#" class="sidebar-link">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M8 5v3.5l2 1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      History
    </a>
  </nav>

  <hr class="sidebar-divider">
  <p class="sidebar-section-label">Categories</p>
  <div class="sidebar-categories">
    {% for theme, scripts in all_themes.items() %}
    <button class="sidebar-category"
            :class="{ 'active': $store.ui.activeCategory === '{{ theme }}' }"
            @click="$store.ui.activeCategory = $store.ui.activeCategory === '{{ theme }}' ? null : '{{ theme }}'">
      {{ theme_icon(theme, 14) }}
      <span class="sidebar-category-name">{{ labels[theme] }}</span>
      <span class="category-count">{{ scripts | length }}</span>
    </button>
    {% endfor %}
  </div>

  <div class="sidebar-spacer"></div>

  <div class="sidebar-cli">
    <div class="sidebar-cli-header">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <rect x="1.5" y="2.5" width="13" height="11" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M4.5 6l2.5 2-2.5 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M9 10h2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <span class="sidebar-cli-title">CLI usage</span>
    </div>
    <p class="sidebar-info-text">Run any script via CLI:<br><code style="display:inline-block; margin-top:0.3em;">uv run main.py &lt;key&gt;</code></p>
  </div>

  <div class="sidebar-status">
    <span class="status-dot" title="All systems go"></span>
    <span class="status-version">v{{ version }}</span>
    <span class="status-hash">{{ git_hash }}</span>
  </div>
</aside>
