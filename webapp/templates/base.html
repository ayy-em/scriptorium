<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Personal script runner with auto-generated forms and streaming output.">
  <link rel="icon" href="/static/logo.webp" type="image/webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="/static/style.css">
  <title>{% block title %}Scriptorium{% endblock %}</title>
  <script>
    /* Prevent dark-mode flash before Alpine initialises */
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.classList.add('dark');
    }
  </script>
  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.store('ui', {
        dark: localStorage.getItem('theme') === 'dark',
        search: '',
        activeCategory: null,
        toggleDark() {
          this.dark = !this.dark;
          localStorage.setItem('theme', this.dark ? 'dark' : 'light');
          document.documentElement.classList.toggle('dark', this.dark);
        },
      });
    });
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body x-data>
  <!-- Fixed top navbar -->
  <header class="topnav">
    <a href="/" class="topnav-brand" @click="$store.ui.activeCategory = null">
      <img src="/static/logo.webp" alt="" width="22" height="22" aria-hidden="true">
      <span>Scriptorium</span>
    </a>

    <div class="topnav-search">
      <svg class="topnav-search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M10 10 14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input id="search-input"
             type="search"
             placeholder="Search scripts…"
             x-model="$store.ui.search"
             autocomplete="off"
             spellcheck="false"
             aria-label="Search scripts">
      <span class="search-kbd" aria-hidden="true">⌘ K</span>
    </div>

    <div class="topnav-actions">
      <button class="dark-toggle"
              @click="$store.ui.toggleDark()"
              :aria-label="$store.ui.dark ? 'Switch to light mode' : 'Switch to dark mode'">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.89 11.89l1.06 1.06M3.05 12.95l1.06-1.06M11.89 4.11l1.06-1.06"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M13.5 9.5A6 6 0 0 1 6.5 2.5a6 6 0 1 0 7 7Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Two-column app body -->
  <div class="app-layout">
    {% include "_sidebar.html" %}
    <main class="main-content">
      <div class="content-wrap">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>

  <script>
    /* Ctrl+K / Cmd+K focuses the search input */
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        const input = document.getElementById('search-input');
        if (input) { input.focus(); input.select(); }
      }
    });
  </script>
</body>
</html>
