<div class="modal-overlay"
     x-show="$store.ui.settingsOpen"
     x-transition:enter="modal-enter"
     x-transition:enter-start="modal-enter-from"
     x-transition:enter-end="modal-enter-to"
     x-transition:leave="modal-leave"
     x-transition:leave-start="modal-leave-from"
     x-transition:leave-end="modal-leave-to"
     @click.self="$store.ui.settingsOpen = false"
     x-cloak>
  <div class="modal-dialog" @click.stop>
    <div class="modal-header">
      <h2>Settings</h2>
      <button class="modal-close" @click="$store.ui.settingsOpen = false" aria-label="Close settings">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <!-- Theme toggle -->
      <div class="settings-section">
        <label class="settings-label">Appearance</label>
        <div class="theme-toggle-wrap">
          <div class="theme-toggle-track"
               @click="$store.ui.toggleDark()"
               :class="{ 'is-dark': $store.ui.dark }"
               role="switch"
               :aria-checked="$store.ui.dark.toString()"
               tabindex="0"
               @keydown.enter.prevent="$store.ui.toggleDark()"
               @keydown.space.prevent="$store.ui.toggleDark()">
            <div class="theme-toggle-thumb">
              <svg class="theme-toggle-sun" width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.5"/>
                <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.89 11.89l1.06 1.06M3.05 12.95l1.06-1.06M11.89 4.11l1.06-1.06"
                      stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              </svg>
              <svg class="theme-toggle-moon" width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M13.5 9.5A6 6 0 0 1 6.5 2.5a6 6 0 1 0 7 7Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="theme-toggle-label theme-toggle-label--light">Light</span>
            <span class="theme-toggle-label theme-toggle-label--dark">Dark</span>
          </div>
        </div>
      </div>

      <!-- Outputs directory -->
      <div class="settings-section">
        <label class="settings-label" for="settings-outputs-dir">Default outputs directory</label>
        <p class="settings-hint">Leave empty to use the default location per script theme.</p>
        <input type="text" id="settings-outputs-dir"
               class="settings-input"
               x-model="$store.ui.outputsDir"
               placeholder="e.g. C:\Users\me\Documents\scriptorium-output">
      </div>

      <hr class="settings-divider">

      <!-- Links -->
      <div class="settings-section settings-links">
        <a href="https://github.com/ayy-em/scriptorium"
           target="_blank" rel="noopener noreferrer"
           class="settings-link-btn">
          <img src="/static/img/github.png" width="16" height="16" alt="" aria-hidden="true" class="settings-link-icon">
          Scriptorium on GitHub
        </a>
        <a href="mailto:em@somethingreally.fun" class="settings-link-btn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true" class="settings-link-icon">
            <rect x="1.5" y="3.5" width="13" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M2 4l6 5 6-5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Contact me
        </a>
      </div>
    </div>

    <div class="modal-footer">
      <button class="settings-save-btn" @click="$store.ui.saveSettings()">
        Save Settings
      </button>
    </div>
  </div>
</div>
