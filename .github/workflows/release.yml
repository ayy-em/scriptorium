name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build .app bundle
        run: uv run pyinstaller packaging/scriptorium.spec --noconfirm --clean

      - name: Create DMG
        run: |
          hdiutil create -volname Scriptorium \
            -srcfolder dist/Scriptorium.app \
            -ov -format UDZO \
            dist/Scriptorium-macOS.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/Scriptorium-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build .exe bundle
        run: uv run pyinstaller packaging/scriptorium-win.spec --noconfirm --clean

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: iscc packaging/installer.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/ScriptoriumSetup.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build Linux binary
        run: uv run pyinstaller packaging/scriptorium-linux.spec --noconfirm --clean

      - name: Create tarball
        run: tar -czf dist/scriptorium-linux-x86_64.tar.gz -C dist scriptorium

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: dist/scriptorium-linux-x86_64.tar.gz

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Scriptorium-macOS.dmg
            ScriptoriumSetup.exe
            scriptorium-linux-x86_64.tar.gz
